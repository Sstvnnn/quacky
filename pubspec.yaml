name: quacky
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.16.0
  flutter_dotenv: ^6.0.1
  flutter_map: ^8.3.1
  latlong2: ^0.10.1
  audioplayers: ^6.8.1
  provider: ^6.1.5+1
  flutter_animate: ^4.5.0
  video_player: ^2.13.0
  image_picker: ^1.2.3
  camera: ^0.11.1
  web_socket_channel: ^3.0.2
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:

  uses-material-design: true

  assets:
    - .env
    - assets/audio/
    - assets/images/
    - assets/videos/



