org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# The Flutter template redirects all subproject build dirs into <root>/build,
# which collides with Kotlin's incremental caches ("Storage is already
# registered" / "Could not close incremental caches") on Windows. Full
# recompiles are a few seconds slower and always correct.
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process
